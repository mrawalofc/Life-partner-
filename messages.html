<!DOCTYPE html>

<head>

    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0a2e 0%, #4a1942 25%, #893168 50%, #c44569 75%, #f8b500 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow-x: hidden;
            font-family: 'Hind Siliguri', 'Poppins', sans-serif;
            position: relative; color: white;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .hearts-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 1; }
        .heart { position: absolute; color: rgba(255,255,255,0.25); font-size: 20px; animation: floatUp linear infinite; bottom: -50px; }
        @keyframes floatUp { 0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.8; } 100% { transform: translateY(-100vh) rotate(360deg) scale(0.5); opacity: 0; } }
        .sparkle { position: absolute; width: 4px; height: 4px; background: white; border-radius: 50%; animation: sparkle 3s ease-in-out infinite; }
        @keyframes sparkle { 0%, 100% { opacity: 0; transform: scale(0); } 50% { opacity: 1; transform: scale(1); } }
        .navbar { position: fixed; top: 0; left: 0; width: 100%; z-index: 200; background: rgba(0,0,0,0.25); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 0 20px; }
        .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }
        .nav-logo { font-family: 'Great Vibes', cursive; font-size: 1.8rem; color: #fff; text-shadow: 0 0 15px rgba(255,105,180,0.8); text-decoration: none; }
        .nav-links { display: flex; gap: 6px; flex-wrap: wrap; }
        .nav-link { padding: 7px 14px; border: none; background: transparent; color: rgba(255,255,255,0.7); font-family: 'Poppins', sans-serif; font-size: 0.82rem; cursor: pointer; border-radius: 20px; transition: all 0.3s ease; text-decoration: none; }
        .nav-link:hover { background: rgba(255,255,255,0.15); color: white; }
        .nav-link.active { background: rgba(255,105,180,0.4); color: white; font-weight: 600; }
        .lang-toggle { position: fixed; top: 75px; right: 20px; z-index: 100; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border-radius: 30px; padding: 5px; display: flex; gap: 5px; border: 1px solid rgba(255,255,255,0.2); }
        .lang-btn { padding: 6px 16px; border: none; background: transparent; color: white; font-family: 'Poppins', sans-serif; font-size: 13px; cursor: pointer; border-radius: 25px; transition: all 0.3s ease; }
        .lang-btn.active { background: rgba(255,255,255,0.3); font-weight: 600; }
        .lang-btn:hover { background: rgba(255,255,255,0.2); }
        .filter-bar { display: flex; justify-content: center; gap: 10px; padding: 20px; flex-wrap: wrap; position: relative; z-index: 10; }
        .filter-btn { padding: 8px 20px; border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: white; border-radius: 25px; cursor: pointer; font-family: 'Poppins', sans-serif; font-size: 0.85rem; transition: all 0.3s ease; }
        .filter-btn:hover, .filter-btn.active { background: rgba(255,107,157,0.3); border-color: rgba(255,107,157,0.5); }
        .page-header { text-align: center; padding: 100px 20px 10px; position: relative; z-index: 10; }
        .page-header h2 { font-family: 'Great Vibes', cursive; font-size: 3rem; text-shadow: 0 0 20px rgba(255,105,180,0.6); margin-bottom: 10px; }
        .page-header p { color: rgba(255,255,255,0.7); font-size: 1rem; }
        .messages-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; padding: 20px; position: relative; z-index: 10; }
        .msg-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(15px); border-radius: 20px; padding: 30px; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 15px 35px rgba(0,0,0,0.2); transition: all 0.4s ease; cursor: pointer; position: relative; overflow: hidden; }
        .msg-card::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); transition: left 0.6s ease; }
        .msg-card:hover::after { left: 100%; }
        .msg-card:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 25px 50px rgba(0,0,0,0.3), 0 0 30px rgba(255,105,180,0.2); border-color: rgba(255,105,180,0.4); }
        .msg-card .msg-emoji { font-size: 2.5rem; margin-bottom: 15px; display: block; }
        .msg-card .msg-text { font-size: 1.05rem; line-height: 1.8; color: rgba(255,255,255,0.9); font-family: 'Hind Siliguri', sans-serif; }
        .msg-card .msg-tag { display: inline-block; margin-top: 15px; padding: 5px 14px; border-radius: 15px; font-size: 0.75rem; border: 1px solid; }
        .msg-card .msg-tag.romantic { background: rgba(255,107,157,0.25); color: #ffb3d1; border-color: rgba(255,107,157,0.3); }
        .msg-card .msg-tag.emotional { background: rgba(100,149,237,0.25); color: #a8d0ff; border-color: rgba(100,149,237,0.3); }
        .msg-card .msg-tag.joke { background: rgba(255,193,7,0.25); color: #ffe082; border-color: rgba(255,193,7,0.3); }
        .msg-card .msg-tag.morning { background: rgba(255,152,0,0.25); color: #ffd180; border-color: rgba(255,152,0,0.3); }
        .msg-card .msg-tag.night { background: rgba(156,39,176,0.25); color: #e1bee7; border-color: rgba(156,39,176,0.3); }
        .floating-emoji { position: fixed; font-size: 24px; pointer-events: none; z-index: 5; animation: floatEmoji 10s ease-in-out infinite; }
        @keyframes floatEmoji { 0%, 100% { transform: translate(0,0) rotate(0deg); } 25% { transform: translate(20px,-30px) rotate(10deg); } 50% { transform: translate(-10px,-50px) rotate(-5deg); } 75% { transform: translate(15px,-20px) rotate(5deg); } }
        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.4s ease; padding: 20px; }
        .popup-overlay.active { opacity: 1; visibility: visible; }
        .popup-box { background: linear-gradient(135deg, #ff6b9d 0%, #c44569 50%, #f8b500 100%); border-radius: 30px; padding: 45px 35px; max-width: 500px; width: 100%; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.4), 0 0 50px rgba(255,107,157,0.4); transform: scale(0.5) translateY(50px); transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); position: relative; border: 2px solid rgba(255,255,255,0.3); }
        .popup-overlay.active .popup-box { transform: scale(1) translateY(0); }
        .popup-emoji { font-size: 3.5rem; margin-bottom: 15px; animation: bounce 1s ease infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .popup-text { font-family: 'Great Vibes', cursive; font-size: 2.2rem; color: white; text-shadow: 0 0 20px rgba(255,255,255,0.5); line-height: 1.4; margin-bottom: 15px; }
        .popup-detail { font-family: 'Hind Siliguri', 'Poppins', sans-serif; font-size: 1rem; color: rgba(255,255,255,0.95); line-height: 1.8; margin-bottom: 20px; }
        .popup-hearts { font-size: 1.8rem; margin-bottom: 20px; animation: heartbeat 1s ease-in-out infinite; }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 10% { transform: scale(1.1); } 20% { transform: scale(1); } 30% { transform: scale(1.1); } 40% { transform: scale(1); } }
        .popup-close { background: rgba(255,255,255,0.25); border: 2px solid rgba(255,255,255,0.5); color: white; padding: 12px 35px; border-radius: 30px; font-family: 'Poppins', sans-serif; font-size: 1rem; cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(5px); }
        .popup-close:hover { background: rgba(255,255,255,0.4); transform: scale(1.05); }
        .popup-close:active { transform: scale(0.95); }
        .hidden { display: none !important; }
        @media (max-width: 768px) { .nav-link { padding: 5px 10px; font-size: 0.7rem; } .page-header h2 { font-size: 2.2rem; } .messages-grid { grid-template-columns: 1fr; padding: 15px; } .popup-text { font-size: 1.8rem; } .filter-btn { padding: 6px 14px; font-size: 0.8rem; } }
    </style>

    <script>
        const messagesData = {
            bn: [
                // Romantic
                { emoji: "💖", text: "তুমি আমার জীবনের সবচেয়ে সুন্দর উপহার। প্রতিদিন তোমাকে ভালোবাসি আরও বেশি।", tag: "romantic", tagText: "ভালোবাসা", detail: "তুমি আমার জীবনের সবচেয়ে বড় আশীর্বাদ। তোমার হাসি দেখলে আমার সব দুঃখ উড়ে যায়। চিরকাল তোমার পাশে থাকতে চাই। 💕" },
                { emoji: "🌙", text: "চাঁদের আলোয় যত তারা জ্বলে, তোমার চেয়ে সুন্দর কিছুই নেই এই পৃথিবীতে।", tag: "romantic", tagText: "রোমান্টিক", detail: "প্রতি রাতে চাঁদের দিকে তাকালে তোমার কথা মনে পড়ে। তুমি আমার চাঁদ, তুমি আমার তারা, তুমি আমার সবকিছু। 🌙✨" },
                { emoji: "🌹", text: "হাজার গোলাপ ফুটুক, কিন্তু তোমার মতো সুন্দর কেউ হবে না। তুমি আমার একমাত্র গোলাপ।", tag: "romantic", tagText: "প্রশংসা", detail: "গোলাপের সৌন্দর্য কাঁটা সহ্য করে ফোটে। তোমার মতো সুন্দর হতে হলে কিছু কষ্ট সহ্য করতেই হয়। তুমি আমার গোলাপ। 🌹" },
                { emoji: "💫", text: "তোমার চোখে যে জাদু আছে, তাতে আমি হারিয়ে যাই বারবার। তুমি আমার স্বপ্নের রানী।", tag: "romantic", tagText: "রোমান্টিক", detail: "তোমার চোখে আমি আমার ভবিষ্যৎ দেখি। সেই চোখে আমি হারিয়ে যেতে চাই চিরকাল। তুমি আমার রানী। 👑💕" },
                { emoji: "🔥", text: "তুমি আমার হৃদয়ের আগুন। তোমার ছোঁয়ায় আমার সব ঠাণ্ডা হৃদয় গরম হয়ে ওঠে।", tag: "romantic", tagText: "আবেগ", detail: "তোমার প্রতি আমার ভালোবাসা কখনো ঠান্ডা হবে না। এটা চিরকাল জ্বলবে, চিরকাল পোড়াবে, চিরকাল আলো দেবে। 🔥💖" },
                { emoji: "💍", text: "তোমার সাথে প্রতিটা মুহূর্ত আমার জীবনের সেরা মুহূর্ত। চিরকাল তোমার হতে চাই।", tag: "romantic", tagText: "চিরকাল", detail: "প্রতি মুহূর্ত তোমার সাথে আমার জন্য অমূল্য। চিরকাল তোমার হাত ধরে হাঁটতে চাই। তুমি আমার চিরকাল। 💍💕" },
                { emoji: "🎵", text: "তোমার হাসি আমার প্রিয় সঙ্গীত। তোমার কণ্ঠ আমার প্রিয় গান। তুমি আমার সবকিছু।", tag: "romantic", tagText: "সঙ্গীত", detail: "তোমার হাসি শুনলে পৃথিবীর সব গান ফিকে লাগে। তুমি আমার প্রিয় সুর, তুমি আমার প্রিয় গান। 🎵💖" },
                { emoji: "✨", text: "তুমি ছাড়া আমার জীবন অন্ধকার। তুমি আমার আলো, তুমি আমার সব।", tag: "romantic", tagText: "আলো", detail: "তুমি ছাড়া আমার জীবনের কোনো রং নেই। তুমি আমার সব রং, তুমি আমার আলো, তুমি আমার জীবন। ✨💕" },
                { emoji: "🦋", text: "তোমার কথা ভাবলেই পেটের মধ্যে প্রজাপতি উড়তে শুরু করে। এটাই কি ভালোবাসা?", tag: "romantic", tagText: "মিষ্টি", detail: "হ্যাঁ, এটাই ভালোবাসা। তোমার কথা ভাবলেই হৃদয় দ্রুত ধড়ফড় করে। তুমি আমার প্রথম এবং শেষ ভালোবাসা। 🦋💕" },
                { emoji: "🌧️", text: "বৃষ্টির দিনে তোমার হাত ধরে হাঁটার স্বপ্ন দেখি। তুমি ছাড়া বৃষ্টিও ফাঁকা লাগে।", tag: "romantic", tagText: "স্বপ্ন", detail: "বৃষ্টির শব্দ শুনলে তোমার কথা মনে পড়ে। তোমার সাথে বৃষ্টিতে ভিজতে চাই। তুমি আমার বৃষ্টির দিনের সঙ্গী। 🌧️💕" },

                // Emotional
                { emoji: "😢", text: "তুমি যখন কাঁদো, আমার চোখেও জল আসে। তোমার কষ্ট আমি নিজের কষ্ট বলে মনে করি।", tag: "emotional", tagText: "আবেগ", detail: "তোমার কান্না আমাকে ভেঙে দেয়। তোমার মুখে হাসি ফোটানোর জন্য আমি সবকিছু করতে পারি। তুমি আমার সব। 😢💕" },

                { emoji: "🍕", text: "What's the difference between you and pizza? — Pizza comes in 30 minutes, you are in my heart forever!", tag: "joke", tagText: "Funny", detail: "Pizza finishes, but you will stay in my heart forever. You are not my favorite 'food', you are my favorite 'mood'! 🍕💕" },
                { emoji: "📱", text: "You are like my phone battery — I can't function without you! 🔋", tag: "joke", tagText: "Funny", detail: "Phone battery can be recharged, but without you, no charger works for me! You are my power bank. 📱💕" },
                { emoji: "🐻", text: "You are softer than a teddy bear. But when I hug you, I don't fall asleep, I stay awake!", tag: "joke", tagText: "Funny", detail: "Teddy bear puts me to sleep, but you steal my sleep! I stay awake all night thinking of you. 🐻💕" },
                { emoji: "🍫", text: "You are sweeter than chocolate. But I can't eat you, because you are my GF!", tag: "joke", tagText: "Funny", detail: "Chocolate finishes in the mouth, but you stay in my heart forever. You are my sweetest 'forbidden' fruit! 🍫💕" },
                { emoji: "😴", text: "When I sleep, I see you in dreams. When I'm awake, I miss you. No vacation!", tag: "joke", tagText: "Funny", detail: "24 hours, 7 days, 365 days — no vacation! Thinking of you is my full-time job. Salary? Your one smile! 😴💕" },
                { emoji: "🤓", text: "You call me crazy? Yes, I am crazy — crazy in love with you!", tag: "joke", tagText: "Funny", detail: "The doctor said I'm crazy. Because I said I can't live without you! The doctor laughed and said — 'That's not madness, that's love!' 🤓💕" },
                { emoji: "🍔", text: "You are juicier than a burger. But if I bite you, not my teeth, my heart breaks!", tag: "joke", tagText: "Funny", detail: "Burger goes to the stomach, but you go to my heart. Instead of biting you, I want to hug you! 🍔💕" },

                // Good Morning
                { emoji: "☕", text: "You are like my first morning tea — warm, sweet, and the best part of starting my day.", tag: "morning", tagText: "Good Morning", detail: "I start every morning thinking of you. Without you, even mornings feel dark. You are my sunrise. ☀️💕" },
                { emoji: "🌅", text: "When sunrise light falls on your face, the world stops. You are my sun.", tag: "morning", tagText: "Good Morning", detail: "Your smile is the first light of my day. Without you, morning doesn't begin. You are my sun, you are my light. ☀️💖" },
                { emoji: "🌻", text: "Good morning my love! May your day be as beautiful as flowers. I love you!", tag: "morning", tagText: "Good Morning", detail: "Every morning is a new opportunity for you. Start your day with your smile. I am always by your side. 🌻💕" },
                { emoji: "☀️", text: "The sun has risen but nothing is brighter than you. Good morning my sunshine!", tag: "morning", tagText: "Good Morning", detail: "When sunlight falls on your face, it seems the sun itself feels shy. You are my brightest morning. ☀️💕" },

                // Good Night
                { emoji: "🌙", text: "As many stars shine in the moonlight, you are my most beautiful dream. Good night my love.", tag: "night", tagText: "Good Night", detail: "The moon has risen in the night sky, but nothing is more beautiful than you. I will dream of you tonight. 🌙💕" },
                { emoji: "😴", text: "I can't sleep without you. I stay awake at night thinking of you. Good night my dear.", tag: "night", tagText: "Good Night", detail: "I can't sleep without thinking of you. I love dreaming about you. Good night. 😴💕" },
                { emoji: "⭐", text: "The stars shine to see you. Because they too know you are the most beautiful. Good night!", tag: "night", tagText: "Good Night", detail: "Stars shine at night but nothing is brighter than you. Have beautiful dreams about you. I love you. ⭐💕" },
                { emoji: "🌌", text: "The night sky is full of stars, and my heart is full of your love. Good night!", tag: "night", tagText: "Good Night", detail: "Thousands of stars in the night sky, but in my heart, only you. I will dream of you tonight. Good night my love. 🌌💕" }

        };

        let currentLang = 'bn';
        let currentFilter = 'all';

        function createHearts() {
            const container = document.getElementById('heartsContainer');
            const heartSymbols = ['❤️','💕','💖','💗','💓','💝','💘','💞'];
            for (let i = 0; i < 25; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (Math.random() * 10 + 8) + 's';
                heart.style.animationDelay = Math.random() * 10 + 's';
                heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                container.appendChild(heart);
            }
        }
        function createSparkles() {
            const container = document.getElementById('heartsContainer');
            for (let i = 0; i < 40; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = Math.random() * 100 + '%';
                sparkle.style.top = Math.random() * 100 + '%';
                sparkle.style.animationDelay = Math.random() * 3 + 's';
                sparkle.style.animationDuration = (Math.random() * 2 + 2) + 's';
                container.appendChild(sparkle);
            }
        }
        function openPopup(id) {
            const el = document.getElementById('popup-' + id);
            if(el) el.classList.add('active');
        }
        function closePopup(id) {
            const el = document.getElementById('popup-' + id);
            if(el) el.classList.remove('active');
        }
        document.querySelectorAll('.popup-overlay').forEach(overlay => {
            overlay.addEventListener('click', function(e) {
                if (e.target === this) this.classList.remove('active');
            });
        });
        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderMessages();
        }
        function filterMessages(tag) {
            currentFilter = tag;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderMessages();
        }
        function renderMessages() {
            const grid = document.getElementById('messagesGrid');
            let data = messagesData[currentLang];
            if (currentFilter !== 'all') {
                data = data.filter(m => m.tag === currentFilter);
            }
            grid.innerHTML = data.map((msg, i) => `
                <div class="msg-card" onclick="showMsgDetail(${messagesData[currentLang].indexOf(msg)})" style="animation: fadeInUp 0.5s ease ${i*0.08}s both;">
                    <span class="msg-emoji">${msg.emoji}</span>
                    <p class="msg-text">${msg.text}</p>
                    <span class="msg-tag ${msg.tag}">${msg.tagText}</span>
                </div>
            `).join('');
        }
        function showMsgDetail(index) {
            const msg = messagesData[currentLang][index];
            document.getElementById('popupMsgEmoji').textContent = msg.emoji;
            document.getElementById('popupMsgTitle').textContent = msg.tagText;
            document.getElementById('popupMsgText').textContent = msg.detail;
            openPopup('msg');
        }
        const style = document.createElement('style');
        style.textContent = `@keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }`;
        document.head.appendChild(style);
        createHearts();
        createSparkles();
        renderMessages();
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            document.body.style.backgroundPosition = `${x*50}% ${y*50}%`;
        });
    </script>
</body>
</html>
